<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MultiTimer — Precision Timers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6c63ff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MultiTimer" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
</head>
<body>

<header>
  <span class="logo">⏱ MultiTimer</span>
  <span class="tagline">Background-safe precision timers</span>
  <button id="pwa-install-btn" class="btn btn-ghost btn-sm" style="display:none; margin-left:8px;" title="Install app on home screen">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Install App
  </button>
</header>

<main>
  <!-- Add Timer -->
  <div class="add-card">
    <h2>Add New Timer</h2>

    <div class="field" style="flex:2; min-width:140px;">
      <label for="timer-name">Name</label>
      <input type="text" id="timer-name" placeholder="e.g. Pomodoro" maxlength="40" />
    </div>

    <div class="field-time" style="flex:3; min-width:200px;">
      <div class="field">
        <label for="t-hours">Hours</label>
        <input type="number" id="t-hours" min="0" max="99" value="0" />
      </div>
      <span style="padding-bottom:9px;">:</span>
      <div class="field">
        <label for="t-minutes">Min</label>
        <input type="number" id="t-minutes" min="0" max="59" value="5" />
      </div>
      <span style="padding-bottom:9px;">:</span>
      <div class="field">
        <label for="t-seconds">Sec</label>
        <input type="number" id="t-seconds" min="0" max="59" value="0" />
      </div>
    </div>

    <div class="field" style="min-width:150px;">
      <label for="t-sound">Alarm Sound</label>
      <select id="t-sound" class="sound-select">
        <option value="chime">🎵 Chime</option>
        <option value="bell">🔔 Bell</option>
        <option value="alarm">🚨 Alarm</option>
        <option value="beep">📳 Beep</option>
        <option value="pulse">💥 Pulse</option>
      </select>
    </div>

    <div style="display:flex;gap:8px;align-items:flex-end;">
      <button class="btn btn-ghost btn-sm" onclick="Audio.preview($('t-sound').value)" title="Preview sound" style="padding:9px 12px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </button>
      <button class="btn btn-primary" onclick="App.addTimer()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Timer
      </button>
    </div>
  </div>

  <!-- Presets -->
  <div class="presets-section">
    <h2>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Saved Presets
    </h2>
    <div class="presets-list" id="presets-list">
      <span class="no-presets">No presets saved yet.</span>
    </div>
  </div>

  <!-- Timers -->
  <div class="timers-grid" id="timers-grid">
    <div class="empty-state">
      <div class="icon">⏳</div>
      <p>No timers yet. Add one above!</p>
    </div>
  </div>
</main>

<div id="toast-container"></div>

<script>
// ── Utilities ──────────────────────────────────────────────────────────────

const $ = id => document.getElementById(id);

function pad(n) { return String(n).padStart(2, '0'); }

function msToHMS(ms) {
  const totalSec = Math.ceil(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return { h, m, s };
}

function hmsToMs(h, m, s) { return ((h * 3600) + (m * 60) + s) * 1000; }

function formatTime(ms) {
  const { h, m, s } = msToHMS(ms);
  return h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
}

function showToast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  $('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Color palette ──────────────────────────────────────────────────────────

const COLORS = ['#6c63ff','#ff6584','#4ade80','#facc15','#38bdf8','#fb923c','#a78bfa','#34d399'];
let colorIndex = 0;
function nextColor() { return COLORS[colorIndex++ % COLORS.length]; }

// ── Audio engine ───────────────────────────────────────────────────────────

const Audio = (() => {
  let ctx = null;

  function getCtx() {
    if (!ctx || ctx.state === 'closed') ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function tone(freq, startAt, duration, type = 'sine', peakGain = 0.38) {
    const c = getCtx();
    const osc  = c.createOscillator();
    const gain = c.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, c.currentTime + startAt);
    gain.gain.linearRampToValueAtTime(peakGain, c.currentTime + startAt + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + startAt + duration);
    osc.connect(gain);
    gain.connect(c.destination);
    osc.start(c.currentTime + startAt);
    osc.stop(c.currentTime + startAt + duration + 0.05);
  }

  // ── Sound definitions (one cycle each) ──

  const sounds = {
    // Ascending musical arpeggio C5→E5→G5→C6
    chime() {
      [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => tone(f, i * 0.2, 0.55, 'sine', 0.36));
    },

    // Single resonant bell with harmonics (3-second tail)
    bell() {
      const c = getCtx();
      const fundamental = 440;
      [[1, 0.5], [2.76, 0.25], [5.4, 0.12], [8.93, 0.07]].forEach(([ratio, amp]) => {
        tone(fundamental * ratio, 0, 3.0, 'sine', amp);
      });
    },

    // Classic two-tone emergency alarm
    alarm() {
      // High → low → high → low  (each phase 0.22s)
      [0, 0.44].forEach(t => tone(960, t,        0.4, 'square', 0.18));
      [0.22, 0.66].forEach(t => tone(760, t,     0.4, 'square', 0.18));
    },

    // Three short electronic beeps
    beep() {
      [0, 0.22, 0.44].forEach(t => tone(880, t, 0.14, 'sine', 0.4));
    },

    // Rapid urgent pulses (5 quick pops)
    pulse() {
      for (let i = 0; i < 5; i++) {
        tone(1200 - i * 60, i * 0.12, 0.08, 'sawtooth', 0.3);
      }
    },
  };

  // Cycle durations in ms — how long to wait before repeating
  const cycleDuration = { chime: 2200, bell: 3500, alarm: 900, beep: 1100, pulse: 1000 };

  // Active alarm loops: { timerId: intervalHandle }
  const loops = {};

  function preview(soundKey) {
    if (sounds[soundKey]) sounds[soundKey]();
  }

  function startLoop(timerId, soundKey) {
    stopLoop(timerId); // clear any existing
    const fn = sounds[soundKey] || sounds.chime;
    fn(); // play immediately
    const period = cycleDuration[soundKey] || 2000;
    loops[timerId] = setInterval(fn, period);
  }

  function stopLoop(timerId) {
    if (loops[timerId] != null) {
      clearInterval(loops[timerId]);
      delete loops[timerId];
    }
  }

  function isLooping(timerId) { return loops[timerId] != null; }

  return { preview, startLoop, stopLoop, isLooping };
})();

// ── Sound metadata (labels + icons for UI) ────────────────────────────────

const SOUND_LABEL = { chime:'🎵 Chime', bell:'🔔 Bell', alarm:'🚨 Alarm', beep:'📳 Beep', pulse:'💥 Pulse' };

// ── Web Worker (inlined blob) ─────────────────────────────────────────────

const workerBlob = new Blob([`
let timers = {};
function startTimer(id, remaining) {
  if (timers[id]) clearInterval(timers[id].interval);
  timers[id] = { remaining, lastTick: Date.now(), interval: null };
  timers[id].interval = setInterval(() => {
    const now = Date.now();
    const elapsed = now - timers[id].lastTick;
    timers[id].lastTick = now;
    timers[id].remaining = Math.max(0, timers[id].remaining - elapsed);
    postMessage({ type: 'tick', id, remaining: timers[id].remaining });
    if (timers[id].remaining <= 0) {
      clearInterval(timers[id].interval);
      delete timers[id];
      postMessage({ type: 'done', id });
    }
  }, 250);
}
function pauseTimer(id) {
  if (timers[id]) {
    clearInterval(timers[id].interval);
    const remaining = timers[id].remaining;
    delete timers[id];
    postMessage({ type: 'paused', id, remaining });
  }
}
function stopTimer(id) {
  if (timers[id]) { clearInterval(timers[id].interval); delete timers[id]; }
}
self.onmessage = ({ data }) => {
  switch (data.cmd) {
    case 'start': startTimer(data.id, data.remaining); break;
    case 'pause': pauseTimer(data.id); break;
    case 'stop':  stopTimer(data.id); break;
  }
};
`], { type: 'application/javascript' });

const worker = new Worker(URL.createObjectURL(workerBlob));

// ── App ────────────────────────────────────────────────────────────────────

const App = (() => {
  const RING_R = 52;
  const CIRC   = 2 * Math.PI * RING_R;
  let timers   = {};  // { id: { name, color, sound, total, remaining, state, hours, minutes, seconds } }
  let uid      = 1;

  // ── Worker messages ──────────────────────────────────────────────────────
  worker.onmessage = ({ data }) => {
    const t = timers[data.id];
    if (!t) return;

    if (data.type === 'tick') {
      t.remaining = data.remaining;
      renderTimerFace(data.id);

    } else if (data.type === 'done') {
      t.remaining = 0;
      t.state = 'done';
      renderTimerFace(data.id);
      updateCardState(data.id);
      Audio.startLoop(data.id, t.sound);
      showToast(`"${t.name}" finished! Tap Stop Alarm to silence.`, 'success');

    } else if (data.type === 'paused') {
      t.remaining = data.remaining;
      t.state = 'paused';
      renderTimerFace(data.id);
      updateCardState(data.id);
    }
  };

  // ── Timer management ─────────────────────────────────────────────────────
  function addTimer(preset = null) {
    const name    = preset ? preset.name    : ($('timer-name').value.trim() || 'Timer');
    const hours   = preset ? preset.hours   : parseInt($('t-hours').value)   || 0;
    const minutes = preset ? preset.minutes : parseInt($('t-minutes').value) || 0;
    const seconds = preset ? preset.seconds : parseInt($('t-seconds').value) || 0;
    const sound   = preset ? (preset.sound || 'chime') : $('t-sound').value;
    const total   = hmsToMs(hours, minutes, seconds);

    if (total <= 0) { showToast('Set a duration > 0', 'error'); return; }

    const id   = uid++;
    const color = nextColor();
    timers[id] = { name, color, sound, total, remaining: total, state: 'idle', hours, minutes, seconds };

    renderTimer(id);
    if (!preset) $('timer-name').value = '';
  }

  function startTimer(id) {
    const t = timers[id];
    if (!t || t.state === 'running') return;
    // If alarm was ringing, stop it first
    Audio.stopLoop(id);
    if (t.state === 'done') t.remaining = t.total;
    t.state = 'running';
    worker.postMessage({ cmd: 'start', id, remaining: t.remaining });
    updateCardState(id);
    renderTimerFace(id);
  }

  function pauseTimer(id) {
    const t = timers[id];
    if (!t || t.state !== 'running') return;
    worker.postMessage({ cmd: 'pause', id });
  }

  function resetTimer(id) {
    const t = timers[id];
    if (!t) return;
    worker.postMessage({ cmd: 'stop', id });
    Audio.stopLoop(id);
    t.remaining = t.total;
    t.state = 'idle';
    renderTimerFace(id);
    updateCardState(id);
  }

  function stopAlarm(id) {
    Audio.stopLoop(id);
    updateCardState(id); // re-render buttons without alarm banner
  }

  function removeTimer(id) {
    worker.postMessage({ cmd: 'stop', id });
    Audio.stopLoop(id);
    delete timers[id];
    const card = document.querySelector(`[data-id="${id}"]`);
    if (card) card.remove();
    checkEmpty();
  }

  // ── Presets ──────────────────────────────────────────────────────────────
  function savePreset(id) {
    const t = timers[id];
    if (!t) return;
    const presets = loadPresets();
    const key = `${t.name}|${t.total}`;
    if (presets.some(p => `${p.name}|${hmsToMs(p.hours,p.minutes,p.seconds)}` === key)) {
      showToast('Preset already saved', 'error'); return;
    }
    presets.push({ name: t.name, hours: t.hours, minutes: t.minutes, seconds: t.seconds, sound: t.sound });
    localStorage.setItem('mt-presets', JSON.stringify(presets));
    renderPresets();
    showToast(`Preset "${t.name}" saved`);
  }

  function deletePreset(idx) {
    const presets = loadPresets();
    presets.splice(idx, 1);
    localStorage.setItem('mt-presets', JSON.stringify(presets));
    renderPresets();
  }

  function loadPresets() {
    try { return JSON.parse(localStorage.getItem('mt-presets')) || []; }
    catch { return []; }
  }

  // ── Rendering ─────────────────────────────────────────────────────────────
  function ringOffset(remaining, total) {
    const frac = total > 0 ? remaining / total : 0;
    return CIRC * (1 - frac);
  }

  function ringColor(remaining, total) {
    const pct = total > 0 ? remaining / total : 0;
    if (pct > 0.5) return '#6c63ff';
    if (pct > 0.2) return '#facc15';
    return '#f87171';
  }

  function renderTimer(id) {
    const t    = timers[id];
    const grid = $('timers-grid');

    const empty = grid.querySelector('.empty-state');
    if (empty) empty.remove();

    const card = document.createElement('div');
    card.className = 'timer-card';
    card.dataset.id = id;

    card.innerHTML = `
      <div class="timer-header">
        <div class="timer-color-dot" style="background:${t.color}"></div>
        <span class="timer-name" title="${t.name}">${t.name}</span>
        <span class="sound-badge" id="sound-badge-${id}" title="Alarm sound">${SOUND_LABEL[t.sound] || t.sound}</span>
        <button class="btn-icon" onclick="App.removeTimer(${id})" title="Delete timer">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="timer-visual">
        <svg class="progress-ring" width="130" height="130" viewBox="0 0 130 130">
          <circle class="ring-bg" cx="65" cy="65" r="${RING_R}" stroke-width="10"/>
          <circle class="ring-fill" id="ring-${id}" cx="65" cy="65" r="${RING_R}" stroke-width="10"
            stroke-dasharray="${CIRC}" stroke-dashoffset="0" stroke="${t.color}"/>
        </svg>
        <div class="timer-time-overlay">
          <div class="timer-display" id="display-${id}">${formatTime(t.total)}</div>
          <div class="timer-status status-idle" id="status-${id}">READY</div>
        </div>
      </div>

      <!-- Alarm banner (hidden until done + ringing) -->
      <div class="alarm-banner" id="alarm-banner-${id}" style="display:none;">
        <span class="alarm-banner-text">🔔 Alarm ringing!</span>
        <button class="btn btn-stop-alarm" onclick="App.stopAlarm(${id})">
          Stop Alarm
        </button>
      </div>

      <div class="timer-controls" id="controls-${id}">
        <button class="btn btn-primary" id="btn-start-${id}" onclick="App.startTimer(${id})">
          ▶ Start
        </button>
        <button class="btn btn-ghost" id="btn-pause-${id}" onclick="App.pauseTimer(${id})" disabled>
          ⏸ Pause
        </button>
        <button class="btn btn-ghost btn-sm" onclick="App.resetTimer(${id})" title="Reset">↺</button>
      </div>

      <div class="save-preset-row">
        <button class="btn btn-ghost btn-sm" onclick="App.savePreset(${id})">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save as Preset
        </button>
      </div>
    `;

    grid.appendChild(card);
  }

  function renderTimerFace(id) {
    const t    = timers[id];
    if (!t) return;
    const disp = $(`display-${id}`);
    const ring = $(`ring-${id}`);
    if (!disp || !ring) return;
    disp.textContent = formatTime(t.remaining);
    ring.style.strokeDashoffset = ringOffset(t.remaining, t.total);
    ring.style.stroke = t.state === 'done' ? '#4ade80' : ringColor(t.remaining, t.total);
  }

  function updateCardState(id) {
    const t    = timers[id];
    const card = document.querySelector(`[data-id="${id}"]`);
    if (!t || !card) return;

    const ringing = Audio.isLooping(id);

    card.className = `timer-card ${t.state === 'running' ? 'running' : t.state === 'done' ? (ringing ? 'done ringing' : 'done') : ''}`;

    const statusEl = $(`status-${id}`);
    const btnStart = $(`btn-start-${id}`);
    const btnPause = $(`btn-pause-${id}`);
    const banner   = $(`alarm-banner-${id}`);

    const stateMap = {
      idle:    { label:'READY',   cls:'status-idle',    startTxt:'▶ Start',   startDis:false, pauseDis:true  },
      running: { label:'RUNNING', cls:'status-running', startTxt:'▶ Start',   startDis:true,  pauseDis:false },
      paused:  { label:'PAUSED',  cls:'status-paused',  startTxt:'▶ Resume',  startDis:false, pauseDis:true  },
      done:    { label:'DONE',    cls:'status-done',    startTxt:'↺ Restart', startDis:false, pauseDis:true  },
    };

    const s = stateMap[t.state] || stateMap.idle;
    statusEl.textContent = s.label;
    statusEl.className   = `timer-status ${s.cls}`;
    btnStart.textContent = s.startTxt;
    btnStart.disabled    = s.startDis;
    btnPause.disabled    = s.pauseDis;

    // Show alarm banner only when done AND sound loop is active
    if (banner) banner.style.display = ringing ? 'flex' : 'none';
  }

  function renderPresets() {
    const list    = $('presets-list');
    const presets = loadPresets();
    list.innerHTML = '';

    if (!presets.length) {
      list.innerHTML = '<span class="no-presets">No presets saved yet.</span>';
      return;
    }

    presets.forEach((p, i) => {
      const chip = document.createElement('div');
      chip.className = 'preset-chip';
      const dur   = hmsToMs(p.hours, p.minutes, p.seconds);
      const sound = p.sound || 'chime';
      chip.innerHTML = `
        <button onclick="App.addTimer(${JSON.stringify(p).replace(/"/g,'&quot;')})" title="Load preset">
          ${p.name} · ${formatTime(dur)} · ${SOUND_LABEL[sound] || sound}
        </button>
        <button class="del-preset" onclick="App.deletePreset(${i})" title="Delete preset">✕</button>
      `;
      list.appendChild(chip);
    });
  }

  function checkEmpty() {
    const grid = $('timers-grid');
    if (!grid.querySelector('.timer-card')) {
      grid.innerHTML = `<div class="empty-state"><div class="icon">⏳</div><p>No timers yet. Add one above!</p></div>`;
    }
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  function init() {
    renderPresets();
    ['timer-name','t-hours','t-minutes','t-seconds'].forEach(elId => {
      $(elId).addEventListener('keydown', e => { if (e.key === 'Enter') addTimer(); });
    });
  }

  init();

  return { addTimer, startTimer, pauseTimer, resetTimer, stopAlarm, removeTimer, savePreset, deletePreset };
})();

// ── Media Session API ──────────────────────────────────────────────────────
// Shows a sticky notification in the Android notification shade with
// the timer name, remaining time, and Play/Pause controls.

const MediaSessionManager = (() => {
  if (!('mediaSession' in navigator)) return { update() {}, clear() {}, setupControls() {} };

  let silentAudioEl = null;
  let metaInterval  = null;

  // A silent audio element is required: browsers only show the media
  // notification while audio is "playing".  We use a 1-second looping
  // data-URI of near-silent audio so nothing is actually audible.
  function ensureSilentAudio() {
    if (silentAudioEl) return;
    // Minimal valid MP3: ~80 bytes of silence
    const silentMp3 = 'data:audio/mpeg;base64,' +
      '/+MYxAANCAYSAABRBlAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA' +
      'AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA' +
      'AAAAAAAAAAAAAAAAA==';
    silentAudioEl = new window.Audio(silentMp3);
    silentAudioEl.loop   = true;
    silentAudioEl.volume = 0.001; // near-zero but not 0 (Chrome may optimise away)
  }

  function playSilent() {
    ensureSilentAudio();
    if (silentAudioEl.paused) {
      silentAudioEl.play().catch(() => {
        // Autoplay blocked — user hasn't interacted yet; will retry on next action
      });
    }
  }

  function stopSilent() {
    if (silentAudioEl && !silentAudioEl.paused) {
      silentAudioEl.pause();
      silentAudioEl.currentTime = 0;
    }
  }

  // Set MediaSession metadata (shown in notification)
  function setMeta(title, artist) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title,   // remaining time  e.g. "04:30"
      artist,  // timer name       e.g. "Pomodoro"
      album:   'MultiTimer',
    });
  }

  // Get the "most relevant" timer to show in the notification:
  // running > paused > done (ringing).  Returns null if nothing active.
  function getPrimaryTimer(timers) {
    if (!timers) return null;
    const all = Object.values(timers);
    return all.find(t => t.state === 'running')
        || all.find(t => t.state === 'paused')
        || all.find(t => t.state === 'done')
        || null;
  }

  // Called every second from the tick handler — keeps the notification live
  function update(timers) {
    const t = getPrimaryTimer(timers);
    if (!t) { clear(); return; }

    playSilent();

    const timeStr = formatTime(t.remaining);
    const stateTag = t.state === 'paused' ? ' ⏸' : t.state === 'done' ? ' ✅' : '';
    setMeta(timeStr + stateTag, t.name);
    navigator.mediaSession.playbackState = t.state === 'running' ? 'playing' : 'paused';
  }

  function clear() {
    stopSilent();
    navigator.mediaSession.metadata = null;
    navigator.mediaSession.playbackState = 'none';
  }

  // Hook notification Play/Pause buttons to the active timer
  function setupControls(getTimers, startFn, pauseFn) {
    if (!('mediaSession' in navigator)) return;

    navigator.mediaSession.setActionHandler('play', () => {
      const all = getTimers();
      const t   = Object.entries(all).find(([, v]) => v.state === 'paused');
      if (t) startFn(Number(t[0]));
    });

    navigator.mediaSession.setActionHandler('pause', () => {
      const all = getTimers();
      const t   = Object.entries(all).find(([, v]) => v.state === 'running');
      if (t) pauseFn(Number(t[0]));
    });

    // 'stop' maps to stopping the alarm on a done timer
    navigator.mediaSession.setActionHandler('stop', () => {
      const all = getTimers();
      Object.entries(all).forEach(([id, v]) => {
        if (v.state === 'done') App.stopAlarm(Number(id));
      });
    });
  }

  return { update, clear, setupControls };
})();

// Patch App to call MediaSession on every tick / state change.
// We do this after App is defined so we don't touch the original code.
(function patchAppForMediaSession() {
  // Intercept worker messages to update MediaSession each tick
  const _orig = worker.onmessage;
  worker.onmessage = function(event) {
    _orig && _orig.call(this, event); // run original handler first
    // After state is updated, refresh the notification
    // Small setTimeout so App's internal timers object is already updated
    setTimeout(() => MediaSessionManager.update(App._timers()), 0);
  };

  // Expose a getter so MediaSession can read timer states
  // (We add App._timers by augmenting the return value below)
})();

// ── Service Worker Registration ────────────────────────────────────────────

if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    try {
      const reg = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
      console.log('[SW] Registered:', reg.scope);

      // If a new SW is waiting, tell it to take over immediately
      if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker?.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            newWorker.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });
    } catch (err) {
      console.warn('[SW] Registration failed:', err);
    }
  });

  // Keepalive: ping the SW every 20s while any timer is running
  // so the browser doesn't suspend it.
  setInterval(() => {
    if (navigator.serviceWorker.controller) {
      const ch = new MessageChannel();
      navigator.serviceWorker.controller.postMessage({ type: 'KEEPALIVE' }, [ch.port2]);
    }
  }, 20_000);
}

// ── PWA Install Prompt ─────────────────────────────────────────────────────

(function initInstallPrompt() {
  let deferredPrompt = null;
  const btn = document.getElementById('pwa-install-btn');

  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    if (btn) btn.style.display = '';
  });

  btn?.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
      showToast('App installed! 🎉');
      btn.style.display = 'none';
    }
    deferredPrompt = null;
  });

  window.addEventListener('appinstalled', () => {
    if (btn) btn.style.display = 'none';
    showToast('MultiTimer installed on home screen 🎉');
  });
})();

// ── Wire MediaSession controls after App is ready ─────────────────────────
// We need a way to expose App's internal timers map.
// Since App is a revealing module, we add a small public getter by re-opening.
// The cleanest approach without touching App: use a shared WeakRef via closure.
// Instead we just wrap App's returned methods and track state externally.

(function wireMediaSession() {
  // Re-expose internal timer state via a proxy approach:
  // Patch the methods that change state to also refresh MediaSession.
  const _start  = App.startTimer.bind(App);
  const _pause  = App.pauseTimer.bind(App);
  const _reset  = App.resetTimer.bind(App);
  const _stop   = App.stopAlarm.bind(App);
  const _remove = App.removeTimer.bind(App);

  // Track our own lightweight state mirror for MediaSession
  const mirror = {}; // id -> { name, state, remaining }

  function refresh() {
    MediaSessionManager.update(mirror);
    if (!Object.keys(mirror).length) MediaSessionManager.clear();
  }

  // Intercept worker messages directly for mirror updates
  const origOnMessage = worker.onmessage;
  worker.onmessage = function({ data }) {
    origOnMessage?.call(this, { data });
    if (!mirror[data.id]) return;
    if (data.type === 'tick')   { mirror[data.id].remaining = data.remaining; }
    if (data.type === 'paused') { mirror[data.id].state = 'paused'; mirror[data.id].remaining = data.remaining; }
    if (data.type === 'done')   { mirror[data.id].state = 'done'; mirror[data.id].remaining = 0; }
    refresh();
  };

  // Patch App methods to update mirror
  App.startTimer = id => {
    _start(id);
    if (mirror[id]) mirror[id].state = 'running';
    refresh();
  };
  App.pauseTimer = id => {
    _pause(id);
    // state will be confirmed via worker 'paused' message
  };
  App.resetTimer = id => {
    _reset(id);
    delete mirror[id];
    refresh();
  };
  App.stopAlarm = id => {
    _stop(id);
    delete mirror[id];
    refresh();
  };
  App.removeTimer = id => {
    _remove(id);
    delete mirror[id];
    refresh();
  };

  // Patch addTimer to register in mirror
  const _add = App.addTimer.bind(App);
  App.addTimer = (preset = null) => {
    _add(preset);
    // We don't have the id here; listen for DOM mutations instead.
    // Simpler: scan the grid after a tick.
  };

  // Setup notification button controls
  MediaSessionManager.setupControls(
    () => mirror,
    id => App.startTimer(id),
    id => App.pauseTimer(id)
  );

  // Expose mirror population hook: called from renderTimer patch below.
  // We need to know when a new timer card is created.
  // Since App is a closure, we use a MutationObserver on the grid.
  const grid = document.getElementById('timers-grid');
  let nextId = 1; // mirrors App's uid — starts at 1
  const obs = new MutationObserver(mutations => {
    mutations.forEach(m => m.addedNodes.forEach(node => {
      if (node.dataset?.id) {
        const id = Number(node.dataset.id);
        const nameEl = node.querySelector('.timer-name');
        const name   = nameEl ? nameEl.textContent : `Timer ${id}`;
        mirror[id] = { name, state: 'idle', remaining: 0 };
      }
    }));
    mutations.forEach(m => m.removedNodes.forEach(node => {
      if (node.dataset?.id) delete mirror[Number(node.dataset.id)];
    }));
  });
  obs.observe(grid, { childList: true });
})();
</script>
