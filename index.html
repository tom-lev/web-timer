<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MultiTimer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#6c63ff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MultiTimer" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>

<!-- ── Home page ── -->
<section id="page-home" class="page active">
  <header class="app-header">
    <span class="app-logo">⏱ MultiTimer</span>
    <button id="pwa-install-btn" class="btn-install" style="display:none" title="Install app">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Install
    </button>
  </header>

  <div id="circles-grid" class="circles-grid"></div>

  <div id="empty-home" class="empty-home">
    <div class="empty-icon">⏱</div>
    <p>No timers yet.<br>Tap <strong>+ New</strong> below to add one.</p>
  </div>
</section>

<!-- ── New Timer page ── -->
<section id="page-new" class="page">
  <header class="app-header">
    <span class="app-logo">New Timer</span>
  </header>

  <div id="edit-banner" class="edit-banner" style="display:none;margin:14px 16px 0;">
    Editing: <span id="edit-banner-name"></span>
    <button onclick="App.cancelEdit()">✕</button>
  </div>

  <div class="form-card">
    <div class="form-row">
      <label class="form-label" for="timer-name">Name</label>
      <input type="text" id="timer-name" class="form-input" placeholder="e.g. Pomodoro" maxlength="40" />
    </div>

    <div class="form-row">
      <label class="form-label">Duration</label>
      <div class="duration-row">
        <div class="duration-field">
          <input type="number" id="t-hours" class="form-input dur-input" min="0" max="99" value="0" />
          <span class="dur-label">h</span>
        </div>
        <div class="duration-field">
          <input type="number" id="t-minutes" class="form-input dur-input" min="0" max="59" value="5" />
          <span class="dur-label">m</span>
        </div>
        <div class="duration-field">
          <input type="number" id="t-seconds" class="form-input dur-input" min="0" max="59" value="0" />
          <span class="dur-label">s</span>
        </div>
      </div>
    </div>

    <div class="form-row">
      <label class="form-label" for="t-sound">Alarm Sound</label>
      <div class="sound-row">
        <select id="t-sound" class="form-input form-select">
          <option value="chime">🎵 Chime</option>
          <option value="bell">🔔 Bell</option>
          <option value="alarm">🚨 Alarm</option>
          <option value="beep">📳 Beep</option>
          <option value="pulse">💥 Pulse</option>
        </select>
        <button class="btn-preview" onclick="SoundEngine.preview($('t-sound').value)" title="Preview sound">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
      </div>
    </div>

    <button id="btn-save" class="btn-add" onclick="App.saveNewTimer()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Save Timer
    </button>
  </div>

  <div class="saved-section">
    <h2 class="saved-title">Saved Timers</h2>
    <div id="saved-items"></div>
  </div>
</section>

<!-- ── Bottom tab bar ── -->
<nav class="tab-bar">
  <button class="tab active" id="tab-home" onclick="App.switchPage('home')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span>Timers</span>
  </button>
  <button class="tab" id="tab-new" onclick="App.switchPage('new')">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span>+ New</span>
  </button>
</nav>

<div id="toast-container"></div>
<script src="app.js?v=4"></script>
</body>
</html>
